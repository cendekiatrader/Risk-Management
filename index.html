<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk Manager PRO</title>

<style>

:root{
    --bg:#c0c0c0;
    --dark:#808080;
    --white:#fff;
    --black:#000;
    --blue:#000080;
    --lcd:#111;
    --green:#00ff00;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#008080;
    font-family:Segoe UI,Tahoma,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.window{
    width:100%;
    max-width:500px;
    background:var(--bg);

    border-top:2px solid var(--white);
    border-left:2px solid var(--white);
    border-right:2px solid var(--black);
    border-bottom:2px solid var(--black);

    box-shadow:5px 5px 15px rgba(0,0,0,.5);
}

.titlebar{
    background:linear-gradient(90deg,var(--blue),#1084d0);
    color:white;
    padding:8px 10px;
    font-weight:bold;
}

.content{
    padding:15px;
}

.row{
    display:flex;
    gap:10px;
    margin-bottom:12px;
}

.col{
    flex:1;
}

label{
    display:block;
    margin-bottom:4px;
    font-size:12px;
    font-weight:bold;
}

.box{
    background:white;

    border-top:2px solid var(--dark);
    border-left:2px solid var(--dark);
    border-right:2px solid var(--white);
    border-bottom:2px solid var(--white);
}

input,
select{
    width:100%;
    height:36px;
    border:none;
    outline:none;
    background:transparent;
    padding:0 8px;
    font-family:monospace;
    font-size:15px;
    font-weight:bold;
}

.risk-wrap{
    display:flex;
}

.risk-wrap select{
    width:50px;
    border-left:1px solid #999;
}

.dirbtn{
    width:100%;
    height:40px;
    font-weight:bold;
    cursor:pointer;
    background:var(--bg);

    border-top:2px solid var(--white);
    border-left:2px solid var(--white);
    border-right:2px solid var(--black);
    border-bottom:2px solid var(--black);
}

.dirbtn.active{
    background:#e0e0e0;

    border-top:2px solid var(--black);
    border-left:2px solid var(--black);
    border-right:2px solid var(--white);
    border-bottom:2px solid var(--white);

    color:var(--blue);
}

.lcd{
    margin-top:15px;
    background:var(--lcd);
    color:var(--green);
    padding:12px;
    border:3px inset gray;
    font-family:monospace;
}

.lcd-big{
    font-size:24px;
    font-weight:bold;
    color:white;
    text-align:right;
    margin:10px 0;
}

.lcd-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:6px;
    border-bottom:1px dashed #333;
    padding-bottom:4px;
}

.tp-grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
    margin-top:10px;
}

.tp-box{
    border:1px solid #444;
    padding:8px;
    text-align:center;
}

.tp-label{
    font-size:10px;
    color:#888;
    margin-bottom:5px;
}

.tp-price{
    color:yellow;
    font-weight:bold;
    font-size:14px;
}

.tp-money{
    color:#00ff00;
    margin-top:5px;
    font-size:12px;
}

.customtp{
    margin-top:10px;
    border:1px solid #444;
    padding:10px;
}

.footer{
    margin-top:15px;
    display:flex;
    justify-content:space-between;
    font-size:11px;
    color:#555;
}

</style>
</head>

<body>

<div class="window">

<div class="titlebar">
risk_manager.exe
</div>

<div class="content">

<div class="row">

<div class="col">
<label>Balance</label>

<div class="box">
<input type="text" id="balance" placeholder="1000">
</div>
</div>

<div class="col">
<label>Leverage</label>

<div class="box">
<input type="text" id="leverage" value="100">
</div>
</div>

</div>

<div class="row">

<div class="col">

<label>Risk</label>

<div class="box risk-wrap">
<input type="text" id="riskVal" value="2">

<select id="riskType">
<option value="%">%</option>
<option value="$">$</option>
</select>

</div>
</div>

<div class="col">
<label>Max Loss</label>

<div class="box">
<input type="text" id="maxLoss" readonly>
</div>

</div>
</div>

<div class="row">

<div class="col">
<label>Entry Price</label>

<div class="box">
<input type="text" id="entry" placeholder="1.2500">
</div>
</div>

<div class="col">
<label>Stop Loss</label>

<div class="box">
<input type="text" id="sl" placeholder="1.2400">
</div>
</div>

</div>

<div class="row">

<div class="col">
<label>Risk Reward</label>

<div class="box">
<input type="text" id="rr" placeholder="2">
</div>
</div>

<div class="col">
<label>Risk Distance</label>

<div class="box">
<input type="text" id="riskDistance" readonly>
</div>
</div>

</div>

<div class="row">

<div class="col">
<button class="dirbtn active" id="btnBuy">
LONG / BUY
</button>
</div>

<div class="col">
<button class="dirbtn" id="btnSell">
SHORT / SELL
</button>
</div>

</div>

<div class="lcd">

<div class="lcd-row">
<span>MODE</span>
<span>FOREX</span>
</div>

<div class="lcd-big" id="lot">
0.00 LOT
</div>

<div class="lcd-row">
<span>MARGIN</span>
<span id="margin">0.00</span>
</div>

<div class="lcd-row">
<span>RISK</span>
<span id="riskmoney">0.00</span>
</div>

<div style="margin-top:10px; font-size:10px; color:#888; text-align:center;">
TARGET PROFIT
</div>

<div class="tp-grid">

<div class="tp-box">
<div class="tp-label" id="tp1label">TP 1 (1:1)</div>
<div class="tp-price" id="tp1">0.00</div>
<div class="tp-money" id="money1">0.00</div>
</div>

<div class="tp-box">
<div class="tp-label" id="tp2label">TP 2 (1:2)</div>
<div class="tp-price" id="tp2">0.00</div>
<div class="tp-money" id="money2">0.00</div>
</div>

<div class="tp-box">
<div class="tp-label" id="tp3label">TP 3 (1:3)</div>
<div class="tp-price" id="tp3">0.00</div>
<div class="tp-money" id="money3">0.00</div>
</div>

</div>

<div class="customtp">

<div style="font-size:11px; color:cyan; margin-bottom:6px;">
CUSTOM TP
</div>

<div class="row" style="margin:0;">

<div class="col">

<div class="box">
<input type="text" id="customTp" placeholder="1.3000">
</div>

</div>

<div class="col">

<div class="box">
<input type="text" id="customProfit" readonly>
</div>

</div>

</div>

</div>

</div>

<div class="footer">
<span>Status: Perfect UI</span>
<span>@CendekiaTrader</span>
</div>

</div>
</div>

<script>

let tradeDir = 1;
let lastEdited = '';

const balance = document.getElementById('balance');
const leverage = document.getElementById('leverage');
const riskVal = document.getElementById('riskVal');
const riskType = document.getElementById('riskType');
const entry = document.getElementById('entry');
const sl = document.getElementById('sl');
const rr = document.getElementById('rr');
const customTp = document.getElementById('customTp');

function cleanNumber(v){

    return parseFloat(
        String(v)
        .replace(/,/g,'.')
    ) || 0;
}

function fmt(v){

    return Number(v).toFixed(2);
}

function setDirection(dir){

    tradeDir = dir;

    document.getElementById('btnBuy').classList.remove('active');
    document.getElementById('btnSell').classList.remove('active');

    if(dir === 1){
        document.getElementById('btnBuy').classList.add('active');
    }else{
        document.getElementById('btnSell').classList.add('active');
    }

    calculate();
}

document.getElementById('btnBuy').onclick = ()=>setDirection(1);
document.getElementById('btnSell').onclick = ()=>setDirection(-1);

[
balance,
leverage,
riskVal,
entry,
sl,
rr,
customTp
].forEach(el=>{

    el.addEventListener('input',function(){

        this.value = this.value.replace(/,/g,'.');

        lastEdited = this.id;

        calculate();
    });

});

riskType.addEventListener('change',calculate);

function calculate(){

    let bal = cleanNumber(balance.value);
    let lev = cleanNumber(leverage.value) || 100;
    let risk = cleanNumber(riskVal.value);

    let ent = cleanNumber(entry.value);
    let stop = cleanNumber(sl.value);

    let rrVal = cleanNumber(rr.value);

    let riskAmt = riskType.value === '%'
        ? bal * (risk / 100)
        : risk;

    document.getElementById('maxLoss').value =
        fmt(riskAmt);

    document.getElementById('riskmoney').innerText =
        fmt(riskAmt);

    if(!ent) return;

    // AUTO RR -> SL
    if(lastEdited === 'rr' && rrVal > 0){

        let riskDistance = ent / lev;

        if(tradeDir === 1){
            stop = ent - (riskDistance / rrVal);
        }else{
            stop = ent + (riskDistance / rrVal);
        }

        sl.value = stop.toFixed(4);
    }

    // AUTO SL -> RR
    if(lastEdited === 'sl' && stop){

        let liqDistance = ent / lev;

        let slDistance = Math.abs(ent - stop);

        if(slDistance > 0){

            rrVal = liqDistance / slDistance;

            rr.value = rrVal.toFixed(2);
        }

        // AUTO SWITCH BUY SELL
        if(stop < ent){
            tradeDir = 1;
            setDirection(1);
        }

        if(stop > ent){
            tradeDir = -1;
            setDirection(-1);
        }
    }

    if(!stop) return;

    let diff = Math.abs(ent - stop);

    document.getElementById('riskDistance').value =
        diff.toFixed(4);

    let lot = riskAmt / diff;

    document.getElementById('lot').innerText =
        lot.toFixed(2) + ' LOT';

    document.getElementById('margin').innerText =
        fmt((lot * ent) / lev);

    // TP BERDASARKAN RR
    let tp1 = ent + (diff * 1 * tradeDir);
    let tp2 = ent + (diff * 2 * tradeDir);
    let tp3 = ent + (diff * 3 * tradeDir);

    document.getElementById('tp1').innerText =
        tp1.toFixed(4);

    document.getElementById('tp2').innerText =
        tp2.toFixed(4);

    document.getElementById('tp3').innerText =
        tp3.toFixed(4);

    document.getElementById('money1').innerText =
        '+' + fmt(riskAmt * 1);

    document.getElementById('money2').innerText =
        '+' + fmt(riskAmt * 2);

    document.getElementById('money3').innerText =
        '+' + fmt(riskAmt * 3);

    // TP LABEL IKUT RR
    document.getElementById('tp1label').innerText =
        'TP 1 (1:1)';

    document.getElementById('tp2label').innerText =
        'TP 2 (1:2)';

    document.getElementById('tp3label').innerText =
        'TP 3 (1:3)';

    // CUSTOM TP
    let ctp = cleanNumber(customTp.value);

    if(ctp){

        let cDiff = Math.abs(ctp - ent);

        let customProfit = (cDiff / diff) * riskAmt;

        let win =
            (tradeDir === 1 && ctp > ent)
            ||
            (tradeDir === -1 && ctp < ent);

        document.getElementById('customProfit').value =
            (win ? '+' : '-') +
            fmt(customProfit);
    }
}

calculate();

</script>

</body>
</html>
