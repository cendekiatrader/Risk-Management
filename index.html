<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk Manager PRO</title>

<style>

:root{
    --bg:#c0c0c0;
    --dark:#808080;
    --white:#fff;
    --black:#000;
    --blue:#000080;
    --lcd:#111;
    --green:#00ff00;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#008080;
    font-family:Segoe UI,Tahoma,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.window{
    width:100%;
    max-width:500px;
    background:var(--bg);

    border-top:2px solid var(--white);
    border-left:2px solid var(--white);
    border-right:2px solid var(--black);
    border-bottom:2px solid var(--black);

    box-shadow:5px 5px 15px rgba(0,0,0,.5);
}

.titlebar{
    background:linear-gradient(90deg,var(--blue),#1084d0);
    color:white;
    padding:8px 10px;
    font-weight:bold;
}

.content{
    padding:15px;
}

.row{
    display:flex;
    gap:10px;
    margin-bottom:12px;
}

.col{
    flex:1;
}

label{
    display:block;
    margin-bottom:4px;
    font-size:12px;
    font-weight:bold;
}

.box{
    background:white;

    border-top:2px solid var(--dark);
    border-left:2px solid var(--dark);
    border-right:2px solid var(--white);
    border-bottom:2px solid var(--white);
}

input,
select{
    width:100%;
    height:36px;
    border:none;
    outline:none;
    background:transparent;
    padding:0 8px;
    font-family:monospace;
    font-size:15px;
    font-weight:bold;
}

.risk-wrap{
    display:flex;
}

.risk-wrap select{
    width:50px;
    border-left:1px solid #999;
}

.dirbtn{
    width:100%;
    height:40px;
    font-weight:bold;
    cursor:pointer;
    background:var(--bg);

    border-top:2px solid var(--white);
    border-left:2px solid var(--white);
    border-right:2px solid var(--black);
    border-bottom:2px solid var(--black);
}

.dirbtn.active{
    background:#e0e0e0;

    border-top:2px solid var(--black);
    border-left:2px solid var(--black);
    border-right:2px solid var(--white);
    border-bottom:2px solid var(--white);

    color:var(--blue);
}

.lcd{
    margin-top:15px;
    background:var(--lcd);
    color:var(--green);
    padding:12px;
    border:3px inset gray;
    font-family:monospace;
}

.lcd-big{
    font-size:24px;
    font-weight:bold;
    color:white;
    text-align:right;
    margin:10px 0;
}

.lcd-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:6px;
    border-bottom:1px dashed #333;
    padding-bottom:4px;
}

.tp-grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
    margin-top:10px;
}

.tp-box{
    border:1px solid #444;
    padding:8px;
    text-align:center;
}

.tp-label{
    font-size:10px;
    color:#888;
    margin-bottom:5px;
}

.tp-price{
    color:yellow;
    font-weight:bold;
    font-size:14px;
}

.tp-money{
    color:#00ff00;
    margin-top:5px;
    font-size:12px;
}

.tp-box-wide{
    grid-column:1 / -1;
    border:1px solid #666;
    margin-top:4px;

    display:flex;
    flex-direction:row;
    align-items:center;
    justify-content:space-between;

    gap:10px;
    padding:8px;
}

.custom-tp-input{
    width:100px;
    background:#222;
    border:1px solid #555;
    color:yellow;

    font-family:monospace;
    font-size:12px;
    text-align:center;
    height:25px;
    flex:1;
}

.custom-tp-input:focus{
    outline:1px solid #00ff00;
    background:#000;
}

.footer{
    margin-top:15px;
    display:flex;
    justify-content:space-between;
    font-size:11px;
    color:#555;
}

</style>
</head>

<body>

<div class="window">

<div class="titlebar">
risk_manager.exe
</div>

<div class="content">

<!-- BALANCE -->
<div class="row">

<div class="col">
<label>Balance</label>

<div class="box">
<input type="text" id="balance" placeholder="1000">
</div>
</div>

<div class="col">
<label>Leverage</label>

<div class="box">
<input type="text" id="leverage" value="100">
</div>
</div>

</div>

<!-- RISK -->
<div class="row">

<div class="col">

<label>Risk</label>

<div class="box risk-wrap">
<input type="text" id="riskVal" value="2">

<select id="riskType">
<option value="%">%</option>
<option value="$">$</option>
</select>

</div>
</div>

<div class="col">
<label>Max Loss</label>

<div class="box">
<input type="text" id="maxLoss" readonly>
</div>

</div>
</div>

<!-- ENTRY -->
<div class="row">

<div class="col">
<label>Entry Price</label>

<div class="box">
<input type="text" id="entry" placeholder="1.2500">
</div>
</div>

<div class="col">
<label>Stop Loss</label>

<div class="box">
<input type="text" id="sl" placeholder="1.2400">
</div>
</div>

</div>

<!-- RR -->
<div class="row">

<div class="col">
<label>Risk Reward</label>

<div class="box">
<input type="text" id="rr" placeholder="2">
</div>
</div>

<div class="col">
<label>Risk Distance</label>

<div class="box">
<input type="text" id="riskDistance" readonly>
</div>
</div>

</div>

<!-- BUY SELL -->
<div class="row">

<div class="col">
<button class="dirbtn active" id="btnBuy">
LONG / BUY
</button>
</div>

<div class="col">
<button class="dirbtn" id="btnSell">
SHORT / SELL
</button>
</div>

</div>

<!-- LCD -->
<div class="lcd">

<div class="lcd-row">
<span>MODE</span>
<span>FOREX</span>
</div>

<div class="lcd-big" id="lot">
0.00 LOT
</div>

<div class="lcd-row">
<span>MARGIN</span>
<span id="margin">0.00</span>
</div>

<div class="lcd-row">
<span>RISK</span>
<span id="riskmoney">0.00</span>
</div>

<div style="margin-top:10px; font-size:10px; color:#888; text-align:center;">
TARGET PROFIT
</div>

<!-- TP GRID -->
<div class="tp-grid">

<!-- TP1 -->
<div class="tp-box">
<div class="tp-label">TP 1 (1:1)</div>
<div class="tp-price" id="tp1">0.00</div>
<div class="tp-money" id="money1">0.00</div>
</div>

<!-- TP2 -->
<div class="tp-box">
<div class="tp-label">TP 2 (1:2)</div>
<div class="tp-price" id="tp2">0.00</div>
<div class="tp-money" id="money2">0.00</div>
</div>

<!-- TP3 -->
<div class="tp-box">
<div class="tp-label">TP 3 (1:3)</div>
<div class="tp-price" id="tp3">0.00</div>
<div class="tp-money" id="money3">0.00</div>
</div>

<!-- CUSTOM TP -->
<div class="tp-box tp-box-wide">

<div class="tp-label" style="color:cyan; white-space:nowrap;">
CUSTOM TP (RR):
</div>

<input
type="text"
id="customTp"
class="custom-tp-input"
placeholder="Price"
>

<div
class="tp-money"
id="moneyCustom"
style="font-size:13px; min-width:60px; text-align:right;"
>
-
</div>

</div>

</div>

</div>

<div class="footer">
<span>Status: Perfect UI</span>
<span>@CendekiaTrader</span>
</div>

</div>
</div>

<script>

let tradeDir = 1;
let lastEdited = '';

const balance = document.getElementById('balance');
const leverage = document.getElementById('leverage');
const riskVal = document.getElementById('riskVal');
const riskType = document.getElementById('riskType');

const entry = document.getElementById('entry');
const sl = document.getElementById('sl');
const rr = document.getElementById('rr');

const customTp = document.getElementById('customTp');

function cleanNumber(v){

    return parseFloat(
        String(v)
        .replace(/,/g,'.')
    ) || 0;
}

function fmt(v){

    return Number(v).toFixed(2);
}

function setDirection(dir){

    tradeDir = dir;

    document.getElementById('btnBuy').classList.remove('active');
    document.getElementById('btnSell').classList.remove('active');

    if(dir === 1){

        document.getElementById('btnBuy').classList.add('active');

    }else{

        document.getElementById('btnSell').classList.add('active');
    }

    calculate();
}

document.getElementById('btnBuy').onclick = ()=>setDirection(1);
document.getElementById('btnSell').onclick = ()=>setDirection(-1);

[
balance,
leverage,
riskVal,
entry,
sl,
rr,
customTp
].forEach(el=>{

    el.addEventListener('input',function(){

        this.value = this.value.replace(/,/g,'.');

        lastEdited = this.id;

        calculate();
    });

});

riskType.addEventListener('change',calculate);

function calculate(){

    let bal = cleanNumber(balance.value);
    let lev = cleanNumber(leverage.value) || 100;

    let risk = cleanNumber(riskVal.value);

    let ent = cleanNumber(entry.value);
    let stop = cleanNumber(sl.value);

    let rrVal = cleanNumber(rr.value);

    let riskAmt =
        riskType.value === '%'
        ? bal * (risk / 100)
        : risk;

    document.getElementById('maxLoss').value =
        fmt(riskAmt);

    document.getElementById('riskmoney').innerText =
        fmt(riskAmt);

    if(!ent || !stop) return;

    // AUTO SWITCH
    if(stop < ent){

        tradeDir = 1;

        document.getElementById('btnBuy').classList.add('active');
        document.getElementById('btnSell').classList.remove('active');
    }

    if(stop > ent){

        tradeDir = -1;

        document.getElementById('btnSell').classList.add('active');
        document.getElementById('btnBuy').classList.remove('active');
    }

    let diff = Math.abs(ent - stop);

    document.getElementById('riskDistance').value =
        diff.toFixed(4);

    // RR -> CUSTOM TP
    let ctp = cleanNumber(customTp.value);

    if(lastEdited === 'rr' && rrVal > 0){

        ctp =
            ent + (diff * rrVal * tradeDir);

        customTp.value = ctp.toFixed(4);
    }

    // CUSTOM TP -> RR
    if(lastEdited === 'customTp' && ctp){

        let rrCalc =
            Math.abs(ctp - ent) / diff;

        rr.value = rrCalc.toFixed(2);

        rrVal = rrCalc;
    }

    let lot = riskAmt / diff;

    document.getElementById('lot').innerText =
        lot.toFixed(2) + ' LOT';

    document.getElementById('margin').innerText =
        fmt((lot * ent) / lev);

    // TP1
    let tp1 = ent + (diff * 1 * tradeDir);

    // TP2
    let tp2 = ent + (diff * 2 * tradeDir);

    // TP3
    let tp3 = ent + (diff * 3 * tradeDir);

    document.getElementById('tp1').innerText =
        tp1.toFixed(4);

    document.getElementById('tp2').innerText =
        tp2.toFixed(4);

    document.getElementById('tp3').innerText =
        tp3.toFixed(4);

    document.getElementById('money1').innerText =
        '+' + fmt(riskAmt * 1);

    document.getElementById('money2').innerText =
        '+' + fmt(riskAmt * 2);

    document.getElementById('money3').innerText =
        '+' + fmt(riskAmt * 3);

    // CUSTOM TP PROFIT
    if(ctp){

        let cDiff = Math.abs(ctp - ent);

        let customProfit =
            (cDiff / diff) * riskAmt;

        let isWin =
            (tradeDir === 1 && ctp > ent)
            ||
            (tradeDir === -1 && ctp < ent);

        document.getElementById('moneyCustom').innerText =
            (isWin ? '+' : '-') +
            fmt(customProfit);

    }else{

        document.getElementById('moneyCustom').innerText = '-';
    }
}

calculate();

</script>

</body>
</html>
