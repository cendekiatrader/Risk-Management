<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Risk Manager</title>
    <style>
        /* --- 90s SYSTEM THEME --- */
        :root {
            --win-gray: #c0c0c0;
            --win-dark-gray: #808080;
            --win-white: #ffffff;
            --win-black: #000000;
            --win-blue: #000080;
            --desktop-teal: #008080;
            --field-bg: #ffffff;
            --field-soft-bg: #eeeeee;
            --panel-bg: #e0e0e0;
            --text-main: #000000;
            --text-muted: #555555;
            --status-text: #333333;
            --lcd-border: #808080;
            --tp-border: #444444;
            --lcd-bg: #1a1a1a;
            --lcd-text: #00ff00;
            --lcd-strong: #ffffff;
            --custom-tp-bg: #222222;
            --custom-tp-focus-bg: #000000;
            --custom-tp-border: #555555;
            --shadow-color: rgba(0,0,0,0.5);
        }

        body.theme-dark {
            --win-gray: #1f2937;
            --win-dark-gray: #111827;
            --win-white: #4b5563;
            --win-black: #020617;
            --win-blue: #0f172a;
            --desktop-teal: #020617;
            --field-bg: #111827;
            --field-soft-bg: #374151;
            --panel-bg: #273244;
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --status-text: #e5e7eb;
            --lcd-border: #4b5563;
            --tp-border: #64748b;
            --lcd-bg: #020617;
            --lcd-text: #34d399;
            --lcd-strong: #f8fafc;
            --custom-tp-bg: #111827;
            --custom-tp-focus-bg: #020617;
            --custom-tp-border: #64748b;
            --shadow-color: rgba(0,0,0,0.85);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--desktop-teal);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            color: var(--text-main); font-size: 14px;
        }

        /* WINDOW CONTAINER */
        .window-container {
            background-color: var(--win-gray);
            width: 100%; max-width: 480px;
            display: flex; flex-direction: column;
            border-top: 2px solid var(--win-white); border-left: 2px solid var(--win-white);
            border-right: 2px solid var(--win-black); border-bottom: 2px solid var(--win-black);
            box-shadow: 5px 5px 15px var(--shadow-color);
        }

        /* MOBILE OVERRIDE */
        @media (max-width: 600px) {
            body { background-color: var(--win-gray); align-items: flex-start; }
            .window-container { max-width: 100%; min-height: 100vh; border: none; box-shadow: none; }
        }

        .win-inset {
            background-color: var(--field-bg);
            border-top: 2px solid var(--win-dark-gray); border-left: 2px solid var(--win-dark-gray);
            border-right: 2px solid var(--win-white); border-bottom: 2px solid var(--win-white);
        }

        .win-btn {
            background-color: var(--win-gray);
            border-top: 2px solid var(--win-white); border-left: 2px solid var(--win-white);
            border-right: 2px solid var(--win-black); border-bottom: 2px solid var(--win-black);
            cursor: pointer; font-weight: bold; display: flex; justify-content: center; align-items: center;
        }
        .win-btn:active { border-style: inset; transform: translateY(1px); }

        .theme-control {
            display: flex; align-items: center; gap: 4px; margin-right: 6px;
            font-size: 10px; color: white; font-weight: bold;
        }
        .theme-control select {
            width: 66px; height: 20px; padding: 0 2px; border: 1px solid var(--win-black);
            background: var(--field-bg); color: var(--text-main);
            font-size: 10px; font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .title-bar {
            background: linear-gradient(90deg, var(--win-blue), #1084d0);
            padding: 6px 10px; display: flex; justify-content: space-between; align-items: center;
            color: white; font-weight: bold; font-size: 14px; flex-shrink: 0;
        }

        /* TABS */
        .tabs-wrapper {
            padding: 8px 8px 0 8px; display: flex; gap: 2px; flex-shrink: 0; background: var(--win-gray);
        }
        .tab-btn {
            flex: 1; padding: 12px 1px; border: none; background: var(--win-gray);
            border-top: 2px solid var(--win-white); border-left: 2px solid var(--win-white);
            border-right: 2px solid var(--win-black); border-bottom: none;
            cursor: pointer; font-size: 11px; touch-action: manipulation;
        }
        .tab-btn.active {
            font-weight: bold; padding-bottom: 14px; margin-top: -4px; z-index: 10;
            border-top: 2px solid var(--win-white); border-left: 2px solid var(--win-white);
            border-right: 2px solid var(--win-dark-gray);
        }

        .content-area {
            padding: 15px; background: var(--win-gray);
            border: 2px solid var(--win-white); border-right-color: black; border-bottom-color: black;
            margin: 0 6px 6px 6px; flex-grow: 1; display: flex; flex-direction: column;
        }
        @media (max-width: 600px) { .content-area { border: none; margin: 0; padding: 15px; } }

        /* INPUTS */
        .compact-options {
            display: flex; align-items: center; gap: 10px;
            background: var(--panel-bg); padding: 6px 10px;
            border: 1px dotted #888; margin-bottom: 15px; font-size: 12px;
        }
        .compact-label { font-weight: bold; margin-right: 5px; }
        .radio-item { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .radio-item input { margin: 0; transform: scale(1.2); cursor: pointer; }
        .fx-symbol-input { width: 72px !important; height: 22px !important; font-size: 11px !important; background: var(--field-bg) !important; border: 1px solid gray !important; text-transform: uppercase; }
        .fx-rate-status { font-size: 10px; color: var(--status-text); min-width: 90px; max-width: 150px; line-height: 1.2; }
        .fx-rate-status.error { color: #b00020; font-weight: bold; }
        .fx-rate-status.success { color: #006400; font-weight: bold; }

        .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .form-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .form-col label { margin-bottom: 4px; font-size: 12px; font-weight: 600; }

        input[type="number"], input[type="text"], select {
            width: 100%; height: 35px; padding: 0 8px; border: none; background: transparent;
            color: var(--text-main); font-size: 15px; font-weight: bold; font-family: monospace; outline: none;
        }
        .risk-group { display: flex; align-items: center; background: var(--field-bg); border: 2px inset gray; }
        .risk-group input { flex: 1; }
        .risk-group select { width: 45px; background: var(--field-soft-bg); border-left: 1px solid gray; font-size: 12px; }

        /* DIRECTION BUTTONS (LONG/SHORT) */
        .dir-btn {
            background-color: var(--win-gray);
            border-top: 2px solid var(--win-white); border-left: 2px solid var(--win-white);
            border-right: 2px solid var(--win-black); border-bottom: 2px solid var(--win-black);
            cursor: pointer; font-weight: bold; font-size: 11px; padding: 8px 0;
            color: var(--text-main); font-family: 'Segoe UI', Tahoma, sans-serif;
            touch-action: manipulation; width: 100%;
        }
        .dir-btn.active {
            border-top: 2px solid var(--win-black); border-left: 2px solid var(--win-black);
            border-right: 2px solid var(--win-white); border-bottom: 2px solid var(--win-white);
            background-color: var(--panel-bg); color: var(--win-blue);
        }

        /* LCD DISPLAY */
        .lcd-display {
            background: var(--lcd-bg); color: var(--lcd-text);
            padding: 12px; border: 3px inset var(--lcd-border); margin-top: 15px;
            font-family: monospace; text-shadow: 0 0 2px rgba(0,255,0,0.4);
        }
        .lcd-row { display: flex; justify-content: space-between; border-bottom: 1px dashed #333; padding-bottom: 4px; margin-bottom: 6px; font-size: 13px; align-items: center; }
        .lcd-big { font-size: 22px; font-weight: bold; text-align: right; color: var(--lcd-strong); margin: 10px 0; }

        /* TP GRID */
        .tp-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
            margin-top: 10px; text-align: center; font-size: 11px;
        }
        .tp-box { border: 1px solid var(--tp-border); padding: 6px; display: flex; flex-direction: column; gap: 2px; }
        .tp-box-wide {
            grid-column: 1 / -1; border-color: #666; margin-top: 4px;
            display: flex; flex-direction: row; align-items: center; justify-content: space-between; gap: 10px; padding: 8px;
        }

        .tp-label { color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .tp-price { color: yellow; font-weight: bold; font-size: 13px; word-break: break-all; }
        .tp-money { color: #00ff00; font-size: 11px; font-weight: bold; margin-top: 2px; }

        .custom-tp-input {
            width: 100px; background: var(--custom-tp-bg); border: 1px solid var(--custom-tp-border); color: yellow;
            font-family: monospace; font-size: 12px; text-align: center; height: 25px; flex: 1;
        }
        .custom-tp-input:focus { outline: 1px solid #00ff00; background: var(--custom-tp-focus-bg); }

        .footer { margin-top: auto; padding-top: 15px; font-size: 11px; display: flex; justify-content: space-between; color: var(--text-muted); }
    </style>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000080">
    <!-- iOS Support -->
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

<div class="window-container">
    <div class="title-bar">
        <span>risk_manager.exe</span>
        <div style="display:flex; gap:2px;">
            <label class="theme-control" for="dashboardTheme">
                THEME
                <select id="dashboardTheme" onchange="setDashboardTheme(this.value)" title="Pilih tema dashboard">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                </select>
            </label>
            <button class="win-btn" style="width:20px; height:20px; font-size:12px;">_</button>
            <button class="win-btn" style="width:20px; height:20px; font-size:12px;">X</button>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs-wrapper">
        <button class="tab-btn active" id="tab-forex">FOREX</button>
        <button class="tab-btn" id="tab-gold">GOLD</button>
        <button class="tab-btn" id="tab-crypto">CRYPTO</button>
        <button class="tab-btn" id="tab-indices">INDICES</button>
        <button class="tab-btn" id="tab-stock">STOCK</button>
    </div>

    <div class="content-area">

        <!-- CONFIGURE AREA -->
        <div id="config-area" style="display:none;">
            <!-- FOREX -->
            <div id="cfg-forex" class="compact-options" style="display:none;">
                <span class="compact-label">PAIR:</span>
                <input type="text" id="forexSymbol" class="fx-symbol-input" placeholder="GBPJPY" maxlength="6" oninput="handleForexSymbolInput()" title="Auto fetch rate, e.g. GBPJPY">
                <span id="fxRateStatus" class="fx-rate-status">Isi pair</span>
            </div>

            <!-- GOLD -->
            <div id="cfg-gold" class="compact-options" style="display:none;">
                <span class="compact-label">ACC:</span>
                <label class="radio-item"><input type="radio" name="goldAcc" value="std" checked onchange="updateUI()"> Standard</label>
                <label class="radio-item"><input type="radio" name="goldAcc" value="cent" onchange="updateUI()"> Cent</label>
            </div>

            <!-- INDICES -->
            <div id="cfg-indices" class="compact-options" style="display:none;">
                <span class="compact-label">MULT:</span>
                <label class="radio-item"><input type="radio" name="idxMult" value="1" checked onchange="updateUI()"> x1</label>
                <label class="radio-item"><input type="radio" name="idxMult" value="10" onchange="updateUI()"> x10</label>
                <label class="radio-item"><input type="radio" name="idxMult" value="custom" onchange="updateUI()"> Cust:</label>
                <input type="number" id="idxCustomMult" placeholder="Val" value="5" style="width:50px; height:20px; font-size:11px; background:white; border:1px solid gray; display:none;" oninput="calculate()">
            </div>

            <!-- STOCK -->
            <div id="cfg-stock" class="compact-options" style="display:none;">
                <span class="compact-label">CURR:</span>
                <label class="radio-item"><input type="radio" name="stockCurr" value="IDR" checked onchange="updateUI()"> IDR</label>
                <label class="radio-item"><input type="radio" name="stockCurr" value="USD" onchange="updateUI()"> USD</label>
            </div>
        </div>

        <!-- FIXED POINTS -->
        <div class="form-row">
            <div class="form-col">
                <label>Fix SL Points:</label>
                <div class="win-inset"><input type="number" id="fixedSlPoints" placeholder="0.00" step="any" oninput="syncFixedPoints()"></div>
            </div>
            <div class="form-col">
                <label>Fix TP Points:</label>
                <div class="win-inset"><input type="number" id="fixedTpPoints" placeholder="0.00" step="any" oninput="syncFixedPoints()"></div>
            </div>
        </div>

        <div class="form-row">
            <div class="form-col">
                <label id="lbl-balance">Balance ($):</label>
                <div class="win-inset"><input type="number" id="balance" placeholder="1000" oninput="calculate()"></div>
            </div>
            <div class="form-col" id="col-leverage">
                <label>Leverage (1:x):</label>
                <div class="win-inset"><input type="number" id="leverage" placeholder="100" value="100" oninput="calculate()"></div>
            </div>
        </div>

        <div class="form-row">
            <div class="form-col">
                <label>Risk:</label>
                <div class="risk-group">
                    <input type="number" id="riskVal" placeholder="2" oninput="calculate()">
                    <select id="riskType" onchange="calculate()"><option value="%">%</option><option value="$">$</option></select>
                </div>
            </div>
            <div class="form-col">
                <label>Max Loss:</label>
                <div class="win-inset" style="background:#ddd;">
                    <input type="text" id="maxLoss" readonly style="color:red;" placeholder="0.00">
                </div>
            </div>
        </div>

        <!-- FORM ENTRY & SL -->
        <div class="form-row">
            <div class="form-col">
                <label>Entry Price:</label>
                <div class="win-inset"><input type="number" id="entry" placeholder="0.00" step="any" oninput="syncFixedPoints()"></div>
            </div>
            <div class="form-col">
                <label>Stop Loss:</label>
                <div class="win-inset"><input type="number" id="sl" placeholder="Auto-Liq" step="any" oninput="handleSLInput()"></div>
            </div>
        </div>

        <!-- RR & CUSTOM TP -->
        <div class="form-row">
            <div class="form-col">
                <label>Risk Reward:</label>
                <div class="win-inset">
                    <input type="text" id="rr" placeholder="2" oninput="handleRRInput()">
                </div>
            </div>

            <div class="form-col">
                <label>Take Profit:</label>
                <div class="win-inset">
                    <input type="text" id="customTpTop" placeholder="0.00" oninput="handleCustomTPInput()">
                </div>
            </div>
        </div>

        <!-- NEW ROW: TRADE DIRECTION (Bawah Entry & SL) -->
        <div class="form-row" style="margin-top: -8px;">
            <div class="form-col">
                <button class="dir-btn" id="btn-dir-1" onclick="setTradeDir(1)">LONG / BUY</button>
            </div>
            <div class="form-col">
                <button class="dir-btn" id="btn-dir--1" onclick="setTradeDir(-1)">SHORT / SELL</button>
            </div>
        </div>

        <!-- LCD OUTPUT -->
        <div class="lcd-display">
            <div class="lcd-row"><span>MODE</span><span id="lcd-mode" style="color:cyan">FOREX</span></div>
            <div class="lcd-big" id="lcd-lot">0.00 LOT</div>
            <div class="lcd-row"><span>MARGIN REQ</span><span id="lcd-margin">0.00</span></div>
            <div class="lcd-row" style="border:none; margin-bottom: 0;"><span>VOLUME</span><span id="lcd-units">-</span></div>

            <!-- AUTO LIQUIDATION (Singular) -->
            <div class="lcd-row" id="lcd-liq-row" style="display:none; border-top:1px dashed #333; padding-top:6px; margin-top:4px;">
                <span style="color:red; font-size: 11px;">LIQ. PRICE (SL)</span>
                <span id="lcd-liq" style="color:red; font-weight:bold; font-size:14px;">-</span>
            </div>

            <div style="border-top:1px dashed #444; margin-top:8px; padding-top:4px; font-size:10px; text-align:center; color:#777;">TARGET PROFIT & ESTIMATED VALUE</div>

            <div class="tp-grid">
                <!-- TP 1-3 -->
                <div class="tp-box">
                    <div class="tp-label">TP 1 (1:1)</div>
                    <div class="tp-price" id="tp1">0.00</div>
                    <div class="tp-money" id="money1">$0.00</div>
                </div>
                <div class="tp-box">
                    <div class="tp-label">TP 2 (1:2)</div>
                    <div class="tp-price" id="tp2">0.00</div>
                    <div class="tp-money" id="money2">$0.00</div>
                </div>
                <div class="tp-box">
                    <div class="tp-label">TP 3 (1:3)</div>
                    <div class="tp-price" id="tp3">0.00</div>
                    <div class="tp-money" id="money3">$0.00</div>
                </div>

                <!-- Custom TP -->
                <div class="tp-box tp-box-wide">
                    <div class="tp-label" style="color:cyan; white-space:nowrap;">TAKE PROFIT:</div>
                    <input type="text" id="customTp" class="custom-tp-input" placeholder="Price" oninput="syncCustomTP()">
                    <div class="tp-money" id="moneyCustom" style="font-size:13px; min-width:60px; text-align:right;">-</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <span>Status: Active</span>
            <span>@CendekiaTrader</span>
        </div>
    </div>
</div>

<script>
    var currentMode = 'forex';
    var tradeDir = 1; // 1 untuk LONG, -1 untuk SHORT
    var fxBaseToUsd = 1;
    var fxQuoteToUsd = 1;
    var fxSymbol = 'EURUSD';
    var fxRatesValid = false;
    var fxRateDebounceTimer = null;
    var DASHBOARD_THEME_KEY = 'riskManagerDashboardTheme';

    document.addEventListener('DOMContentLoaded', function() {
        initDashboardTheme();
        setupTab('tab-forex', 'forex');
        setupTab('tab-gold', 'gold');
        setupTab('tab-crypto', 'crypto');
        setupTab('tab-indices', 'indices');
        setupTab('tab-stock', 'stock');
        setMode('forex');
    });

    function initDashboardTheme() {
        var savedTheme = localStorage.getItem(DASHBOARD_THEME_KEY) || 'light';
        setDashboardTheme(savedTheme);
    }

    window.setDashboardTheme = function(theme) {
        var selectedTheme = theme === 'dark' ? 'dark' : 'light';
        document.body.classList.remove('theme-light', 'theme-dark');
        document.body.classList.add('theme-' + selectedTheme);
        localStorage.setItem(DASHBOARD_THEME_KEY, selectedTheme);

        var themeSelect = document.getElementById('dashboardTheme');
        if (themeSelect) themeSelect.value = selectedTheme;

        var themeColorMeta = document.querySelector('meta[name="theme-color"]');
        if (themeColorMeta) {
            themeColorMeta.setAttribute('content', selectedTheme === 'dark' ? '#020617' : '#000080');
        }
    }

    function setupTab(id, mode) {
        var btn = document.getElementById(id);
        if(btn) {
            btn.addEventListener('click', function() { setMode(mode); });
            btn.addEventListener('touchstart', function(e) { e.preventDefault(); setMode(mode); }, {passive: false});
        }
    }

    // Mengganti arah Long/Short
    window.setTradeDir = function(dir) {
        tradeDir = dir;
        document.getElementById('btn-dir-1').classList.remove('active');
        document.getElementById('btn-dir--1').classList.remove('active');
        document.getElementById('btn-dir-' + dir).classList.add('active');
        if (hasFixedPoints()) {
            syncFixedPoints();
        } else {
            calculate();
        }
    }

    function fixedNumberValue(id, fallback) {
        var el = document.getElementById(id);
        var value = parseFloat(el && el.value);
        return isNaN(value) ? fallback : value;
    }

    function fixedPointPrecision(value) {
        var text = String(value || '');
        return text.indexOf('.') >= 0 ? text.split('.')[1].length : 2;
    }

    function hasFixedPoints() {
        return fixedNumberValue('fixedSlPoints', NaN) > 0 || fixedNumberValue('fixedTpPoints', NaN) > 0;
    }

    window.syncFixedPoints = function() {
        var entryEl = document.getElementById('entry');
        var slEl = document.getElementById('sl');
        var customTpTopEl = document.getElementById('customTpTop');
        var customTpEl = document.getElementById('customTp');
        var entry = fixedNumberValue('entry', NaN);
        var slPoints = fixedNumberValue('fixedSlPoints', NaN);
        var tpPoints = fixedNumberValue('fixedTpPoints', NaN);

        if (isNaN(entry)) {
            calculate();
            return;
        }

        var precision = Math.max(2, fixedPointPrecision(entryEl.value));
        if (slPoints > 0) {
            slEl.value = (entry - (slPoints * tradeDir)).toFixed(precision);
        }
        if (tpPoints > 0) {
            var fixedTp = (entry + (tpPoints * tradeDir)).toFixed(precision);
            customTpTopEl.value = fixedTp;
            if (customTpEl) customTpEl.value = fixedTp;
        }
        handleCustomTPInput();
        calculate();
    }

    // Fungsi cerdas: Jika user ngetik manual SL, otomatis pindahin tombol Long/Short
    window.handleSLInput = function() {
        var ent = parseFloat(document.getElementById('entry').value);
        var sl = parseFloat(document.getElementById('sl').value);
        if (!isNaN(ent) && !isNaN(sl)) {
            if (sl < ent && tradeDir !== 1) setTradeDir(1);
            else if (sl > ent && tradeDir !== -1) setTradeDir(-1);
        }
        calculate();
    }

    // RR -> CUSTOM TP
    window.handleRRInput = function() {
        var rr = parseFloat(document.getElementById('rr').value);
        var entry = parseFloat(document.getElementById('entry').value);
        var sl = parseFloat(document.getElementById('sl').value);

        if(isNaN(rr) || isNaN(entry) || isNaN(sl)) return;

        var diff = Math.abs(entry - sl);
        var customTp = entry + (diff * rr * tradeDir);

        document.getElementById('customTp').value = customTp.toFixed(4);
        document.getElementById('customTpTop').value = customTp.toFixed(4);
        calculate();
    }

    // CUSTOM TP -> RR
    window.handleCustomTPInput = function() {
        var customTp = parseFloat(document.getElementById('customTpTop').value);
        var entry = parseFloat(document.getElementById('entry').value);
        var sl = parseFloat(document.getElementById('sl').value);

        if(isNaN(customTp) || isNaN(entry) || isNaN(sl)) return;

        document.getElementById('customTp').value = customTp;
        var diff = Math.abs(entry - sl);
        var rr = Math.abs(customTp - entry) / diff;

        document.getElementById('rr').value = rr.toFixed(2);
        calculate();
    }

    // Sync bottom custom TP
    window.syncCustomTP = function() {
        document.getElementById('customTpTop').value = document.getElementById('customTp').value;
        handleCustomTPInput();
    }

    function setFxRateStatus(message, type) {
        var status = document.getElementById('fxRateStatus');
        if (!status) return;
        status.textContent = message;
        status.className = 'fx-rate-status' + (type ? ' ' + type : '');
    }

    function parseForexSymbol(symbol) {
        var normalized = (symbol || '').trim().toUpperCase();
        if (!/^[A-Z]{6}$/.test(normalized)) {
            throw new Error('Symbol harus 6 huruf, contoh GBPJPY.');
        }
        return {
            symbol: normalized,
            base: normalized.slice(0, 3).toLowerCase(),
            quote: normalized.slice(3, 6).toLowerCase()
        };
    }

    async function fetchCurrencyRates(currency) {
        var response = await fetch('https://latest.currency-api.pages.dev/v1/currencies/' + currency + '.json');
        if (!response.ok) {
            throw new Error('Gagal fetch rate ' + currency.toUpperCase() + ' (HTTP ' + response.status + ').');
        }
        return response.json();
    }

    async function getCurrencyToUsd(currency) {
        var code = (currency || '').toLowerCase();
        if (code === 'usd') return 1;

        var data = await fetchCurrencyRates(code);
        var rates = data[code];
        if (!rates || typeof rates.usd !== 'number' || rates.usd <= 0) {
            throw new Error('Rate USD untuk ' + code.toUpperCase() + ' tidak tersedia.');
        }
        return rates.usd;
    }

    window.handleForexSymbolInput = function() {
        clearTimeout(fxRateDebounceTimer);
        fxRateDebounceTimer = setTimeout(updateForexRatesFromSymbol, 650);
    }

    window.updateForexRatesFromSymbol = async function() {
        var symbolInput = document.getElementById('forexSymbol');
        var rawSymbol = symbolInput ? symbolInput.value.trim() : '';

        if (!rawSymbol) {
            fxRatesValid = false;
            setFxRateStatus('Isi pair');
            calculate();
            return;
        }

        var parsed;
        try {
            parsed = parseForexSymbol(rawSymbol);
        } catch (err) {
            fxRatesValid = false;
            setFxRateStatus(err.message, 'error');
            return;
        }

        setFxRateStatus('Fetching ' + parsed.symbol + '...', '');
        try {
            var rates = await Promise.all([
                getCurrencyToUsd(parsed.base),
                getCurrencyToUsd(parsed.quote)
            ]);

            fxBaseToUsd = rates[0];
            fxQuoteToUsd = rates[1];
            fxSymbol = parsed.symbol;
            fxRatesValid = true;

            setFxRateStatus(parsed.symbol + ': ' + parsed.base.toUpperCase() + '→USD ' + fxBaseToUsd.toPrecision(6) + ' | ' + parsed.quote.toUpperCase() + '→USD ' + fxQuoteToUsd.toPrecision(6), 'success');
            calculate();
        } catch (err) {
            fxRatesValid = false;
            setFxRateStatus(err.message, 'error');
        }
    }

    window.setMode = function(mode) {
        currentMode = mode;
        document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
        var activeBtn = document.getElementById('tab-' + mode);
        if(activeBtn) activeBtn.classList.add('active');

        var configArea = document.getElementById('config-area');
        var cfgForex = document.getElementById('cfg-forex');
        var cfgStock = document.getElementById('cfg-stock');
        var cfgGold = document.getElementById('cfg-gold');
        var cfgIndices = document.getElementById('cfg-indices');
        var colLev = document.getElementById('col-leverage');

        if(configArea) configArea.style.display = 'none';
        if(cfgForex) cfgForex.style.display = 'none';
        if(cfgStock) cfgStock.style.display = 'none';
        if(cfgGold) cfgGold.style.display = 'none';
        if(cfgIndices) cfgIndices.style.display = 'none';
        if(colLev) colLev.style.display = 'flex';

        if (mode === 'forex') { configArea.style.display = 'block'; cfgForex.style.display = 'flex'; }
        else if (mode === 'stock') { configArea.style.display = 'block'; cfgStock.style.display = 'flex'; colLev.style.display = 'none'; }
        else if (mode === 'gold') { configArea.style.display = 'block'; cfgGold.style.display = 'flex'; }
        else if (mode === 'indices') { configArea.style.display = 'block'; cfgIndices.style.display = 'flex'; }

        updateUI();
    };

    window.updateUI = function() {
        var lblBal = document.getElementById('lbl-balance');
        var entry = document.getElementById('entry');
        var sl = document.getElementById('sl');

        document.getElementById('lcd-mode').innerText = currentMode.toUpperCase();

        if (currentMode === 'forex') {
            lblBal.innerText = "Balance ($):"; entry.placeholder = "1.0850"; sl.placeholder = "Auto-Liq";
            var hasFxSymbol = !!document.getElementById('forexSymbol').value.trim();
            if (!hasFxSymbol) setFxRateStatus('Isi pair');
        }
        else if (currentMode === 'gold') {
            var gAcc = document.querySelector('input[name="goldAcc"]:checked').value;
            lblBal.innerText = (gAcc === 'cent') ? "Balance (USC):" : "Balance ($):";
            entry.placeholder = "2025.50"; sl.placeholder = "Auto-Liq";
        }
        else if (currentMode === 'crypto') {
            lblBal.innerText = "Balance ($):"; entry.placeholder = "0.00150"; sl.placeholder = "Auto-Liq";
        }
        else if (currentMode === 'indices') {
            lblBal.innerText = "Balance ($):"; entry.placeholder = "39050.50"; sl.placeholder = "Auto-Liq";
            var idxMultType = document.querySelector('input[name="idxMult"]:checked').value;
            document.getElementById('idxCustomMult').style.display = (idxMultType === 'custom') ? 'block' : 'none';
        }
        else if (currentMode === 'stock') {
            var curr = document.querySelector('input[name="stockCurr"]:checked').value;
            lblBal.innerText = "Balance (" + curr + "):"; entry.placeholder = "Price"; sl.placeholder = "Auto-Liq";
        }
        calculate();
    };

    function getPrecision(numStr) {
        if (!numStr) return 2;
        if (numStr.indexOf('.') === -1) return 0;
        return numStr.split('.')[1].length;
    }

    function fmt(num, sym) {
        return sym + Number(num).toFixed(2);
    }

    window.calculate = function() {
        var bal = parseFloat(document.getElementById('balance').value) || 0;
        var lev = parseFloat(document.getElementById('leverage').value) || 100;
        var riskVal = parseFloat(document.getElementById('riskVal').value) || 0;
        var riskType = document.getElementById('riskType').value;

        var entryStr = document.getElementById('entry').value;
        var entry = parseFloat(entryStr) || 0;
        var customTp = parseFloat(document.getElementById('customTp').value) || 0;
        var rrVal = parseFloat(document.getElementById('rr').value) || 0;

        var sym = '$';
        if (currentMode === 'stock') {
            sym = document.querySelector('input[name="stockCurr"]:checked').value === 'IDR' ? 'Rp ' : '$';
            lev = 1;
        } else if (currentMode === 'gold') {
            sym = document.querySelector('input[name="goldAcc"]:checked').value === 'cent' ? 'USC ' : '$';
        }

        var riskAmt = (riskType === '%') ? (bal * (riskVal / 100)) : riskVal;
        document.getElementById('maxLoss').value = fmt(riskAmt, sym);

        if (!entry) return;

        // --- CEK APAKAH SL KOSONG / AUTO LIQ ---
        var slInputStr = document.getElementById('sl').value;
        var sl = parseFloat(slInputStr);
        var isLiq = false;
        var diff = 0;

        if (isNaN(sl) || slInputStr.trim() === '') {
            isLiq = true;
            // Hitung harga likuidasi berdasarkan tombol arah (tradeDir)
            var liqDiff = entry / lev;
            sl = entry - (liqDiff * tradeDir);
            if(sl < 0) sl = 0; // Harga tak bisa minus

            diff = Math.abs(entry - sl);
        } else {
            diff = Math.abs(entry - sl);
        }

        if(diff === 0) diff = 0.0000001;

        var lot = 0; var margin = 0; var units = "";

        // Asset Logic
        if (currentMode === 'forex') {
            var contract = 100000;
            var symbolInput = document.getElementById('forexSymbol');
            var hasFxSymbol = symbolInput && symbolInput.value.trim() !== '';

            if (!hasFxSymbol) {
                setFxRateStatus('Isi pair', 'error');
                return;
            }

            if (!fxRatesValid) {
                setFxRateStatus('Rate belum valid. Perbaiki symbol/fetch dulu.', 'error');
                return;
            }

            lot = riskAmt / (diff * contract * fxQuoteToUsd);
            margin = (lot * contract * fxBaseToUsd) / lev;
            units = (lot * 100000).toFixed(0) + " Units";
        }
        else if (currentMode === 'gold') {
            lot = riskAmt / (diff * 100); margin = (lot * 100 * entry) / lev; units = (lot * 100).toFixed(1) + " Oz";
        }
        else if (currentMode === 'crypto') {
            lot = riskAmt / diff; margin = (lot * entry) / lev; units = "Lev 1:" + lev;
        }
        else if (currentMode === 'indices') {
            var idxMultType = document.querySelector('input[name="idxMult"]:checked').value;
            var mult = (idxMultType === 'custom') ? (parseFloat(document.getElementById('idxCustomMult').value) || 1) : parseFloat(idxMultType);
            lot = riskAmt / (diff * mult);
            margin = (lot * mult * entry) / lev;
            units = "Val: " + mult + "/Pt";
        }
        else if (currentMode === 'stock') {
            var shares = Math.floor(riskAmt / diff);
            var isIDR = document.querySelector('input[name="stockCurr"]:checked').value === 'IDR';
            if (isIDR) { lot = shares / 100; margin = shares * entry; units = shares + " Lembar"; }
            else { lot = shares; margin = shares * entry; units = "US Market"; }
        }

        // Tampilkan Lot & Margin
        var lotTxt = lot.toFixed(2) + " LOT";
        if (currentMode === 'crypto') {
            var coinPrecision = Math.max(4, getPrecision(entryStr));
            lotTxt = lot.toFixed(coinPrecision) + " COIN";
        }
        if (currentMode === 'stock' && sym === '$') lotTxt = lot + " SHARE";

        document.getElementById('lcd-lot').innerText = lotTxt;
        document.getElementById('lcd-margin').innerText = fmt(margin, sym);
        document.getElementById('lcd-units').innerText = units;

        // --- TAMPILAN SINGLE LIQUIDATION PRICE ---
        var liqRow = document.getElementById('lcd-liq-row');
        if (isLiq) {
            liqRow.style.display = 'flex';
            var decL = getPrecision(entryStr);
            if (decL < 2) decL = 2;
            if (currentMode === 'stock' && sym === 'Rp ') decL = 0;
            if (currentMode === 'crypto' && decL < 4) decL = 4;

            document.getElementById('lcd-liq').innerText = sl.toFixed(decL);
        } else {
            liqRow.style.display = 'none';
        }

        // --- TP & MONEY CALC ---
        var decimals = getPrecision(entryStr);
        if (decimals < 2) decimals = 2;
        if (currentMode === 'stock' && sym === 'Rp ') decimals = 0;
        if (currentMode === 'crypto' && decimals < 4) decimals = 4;

        // Gunakan arah dari tombol (tradeDir)
        var tp1Val = entry + (diff * 1 * tradeDir);
        var tp2Val = entry + (diff * 2 * tradeDir);
        var tp3Val = entry + (diff * 3 * tradeDir);

        document.getElementById('tp1').innerText = tp1Val.toFixed(decimals);
        document.getElementById('tp2').innerText = tp2Val.toFixed(decimals);
        document.getElementById('tp3').innerText = tp3Val.toFixed(decimals);

        var sign = "+";
        document.getElementById('money1').innerText = sign + fmt(riskAmt * 1, sym);
        document.getElementById('money2').innerText = sign + fmt(riskAmt * 2, sym);
        document.getElementById('money3').innerText = sign + fmt(riskAmt * 3, sym);

        // Custom TP Calc
        var moneyCustomEl = document.getElementById('moneyCustom');
        if (customTp > 0) {
            var diffCustom = Math.abs(customTp - entry);
            // Cek apakah custom TP searah dengan tombol (tradeDir)
            var isWinDir = (tradeDir === 1 && customTp > entry) || (tradeDir === -1 && customTp < entry);

            var pCustom = (diffCustom / diff) * riskAmt;
            if (isWinDir) {
                moneyCustomEl.innerText = "+" + fmt(pCustom, sym);
                moneyCustomEl.style.color = "#00ff00";
            } else {
                moneyCustomEl.innerText = "-" + fmt(pCustom, sym);
                moneyCustomEl.style.color = "red";
            }
        } else {
            moneyCustomEl.innerText = "-";
            moneyCustomEl.style.color = "#888";
        }
    };
</script>
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
            .then((reg) => console.log('Service Worker registered'))
            .catch((err) => console.log('Service Worker failed', err));
    });
}
</script>
